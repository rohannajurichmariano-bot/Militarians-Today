<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Militarians Today | FMNHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fmnhs-blue: #1a4b8c; --fmnhs-gold: #ffcc00; }
        body { 
            background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('fmnhs.jpg'); 
            background-size: cover; background-attachment: fixed; background-position: center;
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }
        
        /* ANIMATION: Fade In Entrance */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* DESIGN: Glassmorphism & Hover Effects */
        .announcement-card { 
            animation: fadeInUp 0.6s ease-out;
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px);
            border: none; border-left: 8px solid var(--fmnhs-blue); 
            margin-bottom: 30px; border-radius: 12px; overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .announcement-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2) !important; }

        .navbar { background-color: var(--fmnhs-blue) !important; border-bottom: 4px solid var(--fmnhs-gold); }
        .school-logo { width: 45px; height: 45px; object-fit: contain; margin-right: 10px; background: white; border-radius: 50%; }
        
        /* SPINNER DESIGN */
        #loader { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(26, 75, 140, 0.2); border-top: 5px solid var(--fmnhs-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.6); display: none; z-index: 9998; }

        /* LIVE STATUS PULSE */
        .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; position: relative; }
        .bg-success::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: inherit; border-radius: inherit; animation: pulse 2s infinite; z-index: -1; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        .post-media { width: 100%; max-height: 500px; object-fit: contain; background: #f0f0f0; cursor: zoom-in; transition: 0.3s; }
        .post-media:active { transform: scale(1.1); }
        #scrollTopBtn { position: fixed; bottom: 30px; right: 30px; display: none; z-index: 1000; border-radius: 50%; }
        .comment-box { background: #f8f9fa; padding: 15px; }
        .comment-bubble { background: white; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; font-size: 0.9rem; border: 1px solid #eee; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay"></div>
<div id="loader"><div class="spinner"></div></div>

<nav class="navbar navbar-dark sticky-top mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="navbar-brand d-flex align-items-center fw-bold m-0" onclick="location.reload()" style="cursor:pointer">
            <img src="logofmnhs.jpg" alt="Logo" class="school-logo"> 
            <span>MILITARIANS TODAY</span>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span id="liveStatus" class="status-badge bg-success text-white">Online</span>
            <button class="btn btn-warning btn-sm fw-bold" id="navBtn" onclick="toggleAuth()">SIGN IN</button>
        </div>
    </div>
</nav>

<button id="scrollTopBtn" class="btn btn-primary" onclick="window.scrollTo({top:0, behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

<div class="container mb-5">
    <div id="adminQuickNav" class="card p-2 mb-4 hidden border-0 shadow-sm flex-row justify-content-between align-items-center" style="background: rgba(255,255,255,0.9)">
        <span class="ps-2 fw-bold">Admin: <span id="adminNameDisplay" class="text-primary"></span></span>
        <div class="btn-group">
            <button class="btn btn-sm btn-outline-primary active" id="btnHome" onclick="showSection('publicFeed'); setActiveBtn('btnHome')">Student View</button>
            <button class="btn btn-sm btn-outline-primary" id="btnDash" onclick="showSection('adminDashboard'); setActiveBtn('btnDash')">Dashboard</button>
        </div>
    </div>

    <div class="text-end mb-2"><small id="lastRefresh" class="text-muted fw-bold"></small></div>

    <section id="publicFeed">
        <div class="row justify-content-center"><div id="announcementsList" class="col-md-9 col-lg-8"></div></div>
    </section>

    <section id="loginSection" class="hidden">
        <div class="card p-4 mx-auto border-0 shadow" style="max-width: 380px; margin-top: 50px; border-radius: 15px;">
            <h5 class="text-center fw-bold mb-4">ADMIN ACCESS</h5>
            <input type="text" id="adminUser" class="form-control mb-3" placeholder="Username">
            <input type="password" id="adminPass" class="form-control mb-4" placeholder="Password">
            <button class="btn btn-primary w-100 fw-bold" onclick="login()">SIGN IN</button>
        </div>
    </section>

    <section id="adminDashboard" class="hidden">
        <div class="card p-4 shadow-sm border-0 mb-4">
            <h4 class="fw-bold text-primary">Publish News</h4>
            <form id="postForm">
                <input type="text" id="postTitle" class="form-control mb-2" placeholder="Headline" required>
                <textarea id="postContent" class="form-control mb-2" rows="3" placeholder="Details..." required></textarea>
                <input type="file" id="postMedia" class="form-control mb-3" accept="image/*,video/*">
                <button type="submit" class="btn btn-primary w-100 fw-bold">PUBLISH TO BULLETIN</button>
            </form>
        </div>
    </section>
</div>

<script>
    const BASE_URL = "https://militarians-bulletin-default-rtdb.firebaseio.com/";
    let announcementsData = {};
    let currentAdmin = JSON.parse(localStorage.getItem('adminSession'));

    function showLoading(s) {
        document.getElementById('loader').style.display = s ? 'block' : 'none';
        document.getElementById('loadingOverlay').style.display = s ? 'block' : 'none';
    }

    // Scroll to Top visibility
    window.onscroll = () => { document.getElementById("scrollTopBtn").style.display = (window.pageYOffset > 250) ? "block" : "none"; };

    async function syncData() {
        if (!navigator.onLine) return;
        try {
            const res = await fetch(`${BASE_URL}posts.json`);
            announcementsData = await res.json() || {};
            renderUI();
            document.getElementById('lastRefresh').innerHTML = `<i class="fas fa-sync"></i> ${new Date().toLocaleTimeString()}`;
        } catch (e) {}
    }

    function renderUI() {
        const list = document.getElementById('announcementsList'); list.innerHTML = "";
        Object.keys(announcementsData).reverse().forEach(key => {
            const p = announcementsData[key];
            let commentsHtml = "";
            if (p.comments) {
                Object.keys(p.comments).forEach(ck => {
                    const c = p.comments[ck];
                    // FEATURE: Reply and Delete icons for Admin
                    const adminTools = currentAdmin ? `
                        <div class="ms-2">
                            <i class="fas fa-reply text-primary me-2 cursor-pointer" onclick="prepareReply('${key}', '${c.name}')" style="cursor:pointer" title="Reply"></i>
                            <i class="fas fa-trash text-danger" onclick="deleteComment('${key}','${ck}')" style="cursor:pointer" title="Delete"></i>
                        </div>` : '';

                    commentsHtml += `<div class="comment-bubble d-flex justify-content-between align-items-center">
                        <span><strong>${c.name}:</strong> ${c.text}</span>${adminTools}
                    </div>`;
                });
            }

            list.innerHTML += `
            <div class="card announcement-card shadow-sm">
                ${p.media ? (p.media.includes("video") ? `<video src="${p.media}" class="post-media" controls></video>` : `<img src="${p.media}" class="post-media">`) : ''}
                <div class="card-body">
                    <h3 class="fw-bold text-primary">${p.title}</h3>
                    <p>${p.content}</p>
                    <div class="d-flex justify-content-between small text-muted border-top pt-2">
                        <span><i class="fas fa-user-edit"></i> ${p.adminName || 'Admin'}</span>
                        <span><i class="fas fa-calendar-alt"></i> ${p.datePosted}</span>
                    </div>
                </div>
                <div class="comment-box">
                    <div id="comments-${key}">${commentsHtml || '<small class="text-muted">No comments yet.</small>'}</div>
                    <div class="input-group mt-2">
                        <input type="text" id="text-${key}" class="form-control form-control-sm" placeholder="Add comment...">
                        <button class="btn btn-primary btn-sm" onclick="addComment('${key}')"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>`;
        });
    }

    function prepareReply(pk, name) {
        const input = document.getElementById(`text-${pk}`);
        input.value = `@${name}: `;
        input.focus();
    }

    async function addComment(pk) {
        const t = document.getElementById(`text-${pk}`).value;
        if(!t) return;
        const n = currentAdmin ? "Admin ("+currentAdmin.name+")" : "Student";
        showLoading(true);
        await fetch(`${BASE_URL}posts/${pk}/comments.json`, {method:"POST", body:JSON.stringify({name:n, text:t})});
        document.getElementById(`text-${pk}`).value = "";
        showLoading(false);
        syncData();
    }

    async function deleteComment(pk, ck) { if(confirm("Delete comment?")) { showLoading(true); await fetch(`${BASE_URL}posts/${pk}/comments/${ck}.json`, {method:"DELETE"}); showLoading(false); syncData(); } }

    async function login() {
        const u = document.getElementById('adminUser').value;
        const p = document.getElementById('adminPass').value;
        showLoading(true);
        const res = await fetch(`${BASE_URL}admins/${u}.json`);
        const d = await res.json();
        showLoading(false);
        if(d && d.password === p) {
            localStorage.setItem('adminSession', JSON.stringify({name: d.name}));
            location.reload();
        } else alert("Invalid Login");
    }

    function logout() { localStorage.removeItem('adminSession'); location.reload(); }
    function showSection(id) { 
        ['publicFeed', 'adminDashboard', 'loginSection'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function setActiveBtn(id) { document.getElementById('btnHome').classList.remove('active'); document.getElementById('btnDash').classList.remove('active'); document.getElementById(id).classList.add('active'); }
    function toggleAuth() { if(currentAdmin) logout(); else showSection('loginSection'); }

    if(currentAdmin) {
        document.getElementById('adminQuickNav').classList.remove('hidden');
        document.getElementById('adminNameDisplay').innerText = currentAdmin.name;
        document.getElementById('navBtn').innerText = "SIGN OUT";
        showSection('adminDashboard');
        setActiveBtn('btnDash');
    }

    syncData();
    setInterval(syncData, 5000);

    const toBase64 = f => new Promise((res) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
    document.getElementById('postForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        showLoading(true);
        const f = document.getElementById('postMedia').files[0];
        const post = {
            title: document.getElementById('postTitle').value,
            content: document.getElementById('postContent').value,
            media: f ? await toBase64(f) : "",
            adminName: currentAdmin.name,
            datePosted: new Date().toLocaleString()
        };
        await fetch(`${BASE_URL}posts.json`, { method: "POST", body: JSON.stringify(post) });
        location.reload();
    });
</script>
</body>
</html>
